<article><h1 id="postgresql-">PostgreSQL 性能优化</h1>

</span></span></span></code></pre><h2 id="heading">部分索引</h2>
<pre style="color:#e6edf3;background-color:#0d1117;"><code><span style="display:flex;"><span><span style="color:#ff7b72">CREATE</span><span style="color:#6e7681"> </span><span style="color:#ff7b72">INDEX</span><span style="color:#6e7681"> </span>idx_active<span style="color:#6e7681"> </span><span style="color:#ff7b72">ON</span><span style="color:#6e7681"> </span>users(email)<span style="color:#6e7681"> </span><span style="color:#ff7b72">WHERE</span><span style="color:#6e7681"> </span>deleted_at<span style="color:#6e7681"> </span><span style="color:#ff7b72">IS</span><span style="color:#6e7681"> </span><span style="color:#ff7b72">NULL</span>;<span style="color:#6e7681">
</span></span></span></code></pre><h2 id="explain-analyze">EXPLAIN ANALYZE</h2>
<pre style="color:#e6edf3;background-color:#0d1117;"><code><span style="display:flex;"><span><span style="color:#ff7b72">EXPLAIN</span><span style="color:#6e7681"> </span><span style="color:#ff7b72">ANALYZE</span><span style="color:#6e7681"> </span><span style="color:#ff7b72">SELECT</span><span style="color:#6e7681"> </span><span style="color:#ff7b72;font-weight:bold">*</span><span style="color:#6e7681"> </span><span style="color:#ff7b72">FROM</span><span style="color:#6e7681"> </span>posts<span style="color:#6e7681"> </span><span style="color:#ff7b72">WHERE</span><span style="color:#6e7681"> </span>published<span style="color:#ff7b72;font-weight:bold">=</span><span style="color:#ff7b72">true</span><span style="color:#6e7681"> </span><span style="color:#ff7b72">ORDER</span><span style="color:#6e7681"> </span><span style="color:#ff7b72">BY</span><span style="color:#6e7681"> </span>created_at<span style="color:#6e7681"> </span><span style="color:#ff7b72">DESC</span><span style="color:#6e7681"> </span><span style="color:#ff7b72">LIMIT</span><span style="color:#6e7681"> </span><span style="color:#a5d6ff">20</span>;<span style="color:#6e7681">
</span></span></span></code></pre></article>
