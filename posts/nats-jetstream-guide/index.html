<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATS JetStream 消息队列实战</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; }
        pre { border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
<article><h1 id="nats-jetstream">NATS JetStream</h1>
<h2 id="-stream">创建 Stream</h2>
<pre style="color:#e6edf3;background-color:#0d1117;"><code><span style="display:flex;"><span>js.<span style="color:#d2a8ff;font-weight:bold">AddStream</span>(<span style="color:#ff7b72;font-weight:bold">&amp;</span>nats.StreamConfig{
</span></span><span style="display:flex;"><span>    Name:     <span style="color:#a5d6ff">&#34;EVENTS&#34;</span>,
</span></span><span style="display:flex;"><span>    Subjects: []<span style="color:#ff7b72">string</span>{<span style="color:#a5d6ff">&#34;events.&gt;&#34;</span>},
</span></span><span style="display:flex;"><span>})
</span></span></code></pre><h2 id="pull-consumer">Pull Consumer</h2>
<pre style="color:#e6edf3;background-color:#0d1117;"><code><span style="display:flex;"><span>sub, _ <span style="color:#ff7b72;font-weight:bold">:=</span> js.<span style="color:#d2a8ff;font-weight:bold">PullSubscribe</span>(<span style="color:#a5d6ff">&#34;events.site.build&#34;</span>, <span style="color:#a5d6ff">&#34;builder&#34;</span>)
</span></span><span style="display:flex;"><span>msgs, _ <span style="color:#ff7b72;font-weight:bold">:=</span> sub.<span style="color:#d2a8ff;font-weight:bold">Fetch</span>(<span style="color:#a5d6ff">10</span>)
</span></span><span style="display:flex;"><span><span style="color:#ff7b72">for</span> _, msg <span style="color:#ff7b72;font-weight:bold">:=</span> <span style="color:#ff7b72">range</span> msgs { msg.<span style="color:#d2a8ff;font-weight:bold">Ack</span>() }
</span></span></code></pre></article>
</body>
</html>
